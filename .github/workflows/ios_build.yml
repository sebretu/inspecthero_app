name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA (Unsigned)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.27.x'

      - name: Regenerate and Patch iOS Project
        run: |
          # Backup critical source files ONLY
          mkdir -p ios_backup
          cp ios/Runner/Info.plist ios_backup/Info.plist || true
          cp ios/Runner/AppDelegate.swift ios_backup/AppDelegate.swift || true
          
          # Remove problematic ios folder
          rm -rf ios
          
          # Regenerate ios folder with correct structure
          flutter create --platforms ios --org pl.inspecthero .
          
          # Restore critical source files (Except SceneDelegate which causes crashes)
          cp ios_backup/Info.plist ios/Runner/Info.plist || true
          cp ios_backup/AppDelegate.swift ios/Runner/AppDelegate.swift || true
          
          # Remove Scene support from Info.plist (Strongly recommended for simple apps to avoid crashes)
          # We use a Ruby script to safely remove the UIApplicationSceneManifest key and its dict
          ruby -e "
            require 'plist'
            plist = Plist.parse_xml('ios/Runner/Info.plist')
            plist.delete('UIApplicationSceneManifest')
            File.open('ios/Runner/Info.plist', 'w') { |f| f.write(plist.to_plist) }
          " || sed -i '' '/UIApplicationSceneManifest/,/<\/dict>/d' ios/Runner/Info.plist
          
          # Force the original Bundle Identifier in the newly generated project
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = pl.inspecthero.app;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Manually ensure podhelper is there (backup plan)
          mkdir -p ios/Flutter
          cp "$FLUTTER_ROOT/packages/flutter_tools/bin/podhelper.rb" ios/Flutter/podhelper.rb
          
          # Use Ruby to safely inject our modifications into the standard Podfile
          # This is better than restoring from repo because it preserves the template
          ruby -e "
            content = File.read('ios/Podfile')
            mod = %q{
              flutter_additional_ios_build_settings(target)
              if target.respond_to?(:build_configurations)
                target.build_configurations.each do |config|
                  config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                  config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                  config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] ||= ['$(inherited)', 'PERMISSION_CAMERA=1', 'PERMISSION_PHOTOS=1', 'PERMISSION_LOCATION=1', 'PERMISSION_MICROPHONE=1', 'PERMISSION_NOTIFICATIONS=1']
                end
              end
            }
            content.gsub!('flutter_additional_ios_build_settings(target)', mod)
            File.write('ios/Podfile', content)
          "

      - name: Get dependencies
        run: flutter pub get

      - name: Generate App Icons
        run: flutter pub run flutter_launcher_icons

      - name: CocoaPods Install
        run: |
          cd ios
          pod install
          cd ..

      - name: Build iOS
        run: |
          # Use standard flutter build with no-codesign
          flutter build ios --release --no-codesign --build-number=1 --build-name=1.0.0
          
      - name: Create IPA (Robust Search)
        run: |
          # Locate the .app in any build folder
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -n 1)
          
          if [ -d "$APP_PATH" ]; then
            echo "Runner.app found at $APP_PATH, creating IPA..."
            mkdir Payload
            cp -r "$APP_PATH" Payload/
            zip -vr Runner.ipa Payload
          else
            echo "Fatal: Runner.app NOT found anywhere!"
            find build -name "*.app"
            exit 1
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: Runner.ipa
