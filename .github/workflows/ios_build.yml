name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA (Unsigned)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (Archive)
        run: |
          # Prepare Flutter dependencies and intermediate files
          flutter build ios --release --no-codesign --build-number=1 --build-name=1.0.0 || true
          
          # Run xcodebuild archive to create a full application structure
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Runner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean
            
      - name: Create IPA from Archive
        run: |
          APP_PATH="build/Runner.xcarchive/Products/Applications/Runner.app"
          if [ -d "$APP_PATH" ]; then
            echo "Runner.app found in archive, creating IPA..."
            mkdir Payload
            cp -r "$APP_PATH" Payload/
            zip -vr Runner.ipa Payload
          else
            echo "Runner.app NOT found in archive at $APP_PATH! Build failed."
            # Debug: show archive structure
            ls -R build/Runner.xcarchive || true
            exit 1
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: Runner.ipa
