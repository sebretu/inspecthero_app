name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA (Unsigned)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (Standard Flutter)
        run: |
          flutter build ios --release --no-codesign --build-number=1 --build-name=1.0.0 || true
          
      - name: Create IPA (Robust Search)
        run: |
          # Use find to locate the .app wherever it might be
          APP_PATH=$(find build/ios -name "Runner.app" -type d | grep "Release-iphoneos" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build/ios -name "Runner.app" -type d | head -n 1)
          fi
          
          if [ -d "$APP_PATH" ]; then
            echo "Runner.app found at $APP_PATH, creating IPA..."
            mkdir Payload
            cp -r "$APP_PATH" Payload/
            zip -vr Runner.ipa Payload
          else
            echo "Runner.app NOT found anywhere in build/ios/"
            find build -name "*.app"
            exit 1
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: Runner.ipa
