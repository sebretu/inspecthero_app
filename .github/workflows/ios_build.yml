name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA (Unsigned)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.x'

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (Direct Xcode)
        run: |
          # Prepare Flutter dependencies and intermediate files
          flutter build ios --release --no-codesign --build-number=1 --build-name=1.0.0 || true
          
          # Run xcodebuild directly to bypass Flutter's signing checks
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build_xcode \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build
            
      - name: Create IPA
        run: |
          APP_PATH="build_xcode/Build/Products/Release-iphoneos/Runner.app"
          if [ -d "$APP_PATH" ]; then
            echo "Runner.app found at $APP_PATH, creating IPA..."
            mkdir Payload
            cp -r "$APP_PATH" Payload/
            zip -vr Runner.ipa Payload
          else
            echo "Runner.app NOT found at $APP_PATH! Build failed."
            # List files to debug
            find build_xcode -name "*.app"
            exit 1
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: Runner.ipa
