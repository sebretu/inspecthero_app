name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA (Unsigned)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.27.x'

      - name: Get dependencies
        run: |
          flutter pub get
          # Manually copy Flutter helper scripts from SDK to project
          mkdir -p ios/Flutter
          cp "$FLUTTER_ROOT/packages/flutter_tools/bin/podhelper.rb" ios/Flutter/podhelper.rb
          # Ensure Generated.xcconfig is present (sometimes it's missed)
          flutter build ios --config-only || true
          ls -la ios/Flutter/

      - name: CocoaPods Install
        run: |
          cd ios
          pod install
          ls -la
          cd ..

      - name: Build iOS
        run: |
          # Remove || true to see the actual error
          flutter build ios --release --no-codesign --build-number=1 --build-name=1.0.0
          ls -R build/ios || echo "Build directory not found!"
          
      - name: Create IPA (Robust Search)
        run: |
          # Locate the .app in any build folder
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -n 1)
          
          if [ -d "$APP_PATH" ]; then
            echo "Runner.app found at $APP_PATH, creating IPA..."
            mkdir Payload
            cp -r "$APP_PATH" Payload/
            zip -vr Runner.ipa Payload
          else
            echo "Fatal: Runner.app NOT found anywhere!"
            find build -name "*.app"
            exit 1
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: Runner.ipa
