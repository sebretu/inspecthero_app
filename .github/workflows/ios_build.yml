name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA (Unsigned)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.27.x'

      - name: Get dependencies
        run: flutter pub get

      - name: CocoaPods Install
        run: |
          cd ios
          # Ensure Podfile exists (we just added it, but good to check)
          if [ ! -f "Podfile" ]; then
            echo "Warning: Podfile missing, attempts to generate one..."
          fi
          pod install || (echo "Pod install failed, but continuing..." && true)
          cd ..

      - name: Build iOS
        run: |
          # Use standard flutter build with no-codesign
          flutter build ios --release --no-codesign --build-number=1 --build-name=1.0.0 || true
          
      - name: Create IPA (Robust Search)
        run: |
          # Locate the .app in any build folder
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -n 1)
          
          if [ -d "$APP_PATH" ]; then
            echo "Runner.app found at $APP_PATH, creating IPA..."
            mkdir Payload
            cp -r "$APP_PATH" Payload/
            zip -vr Runner.ipa Payload
          else
            echo "Fatal: Runner.app NOT found anywhere!"
            find build -name "*.app"
            exit 1
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: Runner.ipa
